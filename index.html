<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LifeHub</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header class="header">

        <h1>LifeHub</h1>

        <div id="greeting" class="greeting">
            Добро пожаловать
        </div>

        <div id="todayDate" class="date">
            ...
        </div>

    </header>

    <section class="card">

        <h2>🎯 Сегодня</h2>

        <div class="progress">

            <div class="progress-fill"
                 id="progressFill"></div>

        </div>

        <div class="progress-text"
             id="progressText">

            0%

        </div>

        <div class="streak"
             id="streak">

            🔥 Серия: 0 дней

        </div>

    </section>

    <section class="card">

        <h2>📅 Время</h2>

        <div class="time-row">

            <span>Неделя</span>

            <span id="weekLeft">
                ...
            </span>

        </div>

        <div class="time-row">

            <span>Месяц</span>

            <span id="monthLeft">
                ...
            </span>

        </div>

        <div class="time-row">

            <span>Год</span>

            <span id="yearLeft">
                ...
            </span>

        </div>

    </section>

    <section class="card">

        <div class="section-header">

            <h2>✅ Сегодня</h2>

            <button id="addButton">

                +

            </button>

        </div>

        <div id="taskList">

        </div>

    </section>

    <nav class="bottomNav">

        <button class="active">
            🏠
            <span>Сегодня</span>
        </button>

        <button>
            📋
            <span>Задачи</span>
        </button>

        <button>
            💧
            <span>Привычки</span>
        </button>

        <button>
            🎯
            <span>Цели</span>
        </button>

        <button>
            📊
            <span>Статистика</span>
        </button>

    </nav>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
