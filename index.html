<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>LifeHub</title>

    <meta name="theme-color" content="#0b1d16">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header class="header">

        <h1 class="logo">LifeHub</h1>

        <div id="greeting" class="greeting">
            Добро пожаловать 👋
        </div>

        <div id="todayDate" class="date"></div>

    </header>


    <main id="screens">

        <!-- Главная -->
        <section id="screen-home" class="screen active">

            <section class="card">

                <h2>🎯 Сегодня</h2>

                <div class="progress">

                    <div id="progressFill"
                         class="progress-fill"></div>

                </div>

                <div id="progressText"
                     class="progress-text">

                    0 из 0 • 0%

                </div>

                <div id="streak"
                     class="streak">

                    🔥 Серия: 0 дней

                </div>

            </section>


            <section class="card">

                <h2>📅 Время</h2>

                <div class="time-row">
                    <span>Неделя</span>
                    <span id="weekLeft"></span>
                </div>

                <div class="time-row">
                    <span>Месяц</span>
                    <span id="monthLeft"></span>
                </div>

                <div class="time-row">
                    <span>Год</span>
                    <span id="yearLeft"></span>
                </div>

            </section>


            <section class="card">

    <div class="section-header">

        <h2>✅ Сегодня</h2>

        <button id="addButton">+</button>

    </div>

    <input
        id="searchInput"
        class="search"
        type="text"
        placeholder="🔍 Поиск задачи">

    <div id="taskList"></div>

</section>

        </section>


        <!-- Остальные вкладки -->
        <section id="screen-tasks" class="screen"></section>

        <section id="screen-habits" class="screen"></section>

        <section id="screen-goals" class="screen"></section>

        <section id="screen-stats" class="screen"></section>

    </main>


    <nav class="bottomNav">

        <button class="nav-btn active" data-screen="home">
            🏠
            <span>Сегодня</span>
        </button>

        <button class="nav-btn" data-screen="tasks">
            📋
            <span>Задачи</span>
        </button>

        <button class="nav-btn" data-screen="habits">
            💧
            <span>Привычки</span>
        </button>

        <button class="nav-btn" data-screen="goals">
            🎯
            <span>Цели</span>
        </button>

        <button class="nav-btn" data-screen="stats">
            📊
            <span>Статистика</span>
        </button>

    </nav>

</div>

</div>

<script src="data.js"></script>
<script src="storage.js"></script>
<script src="tasks.js"></script>
<script src="stats.js"></script>
<script src="navigation.js"></script>
<script src="ui.js"></script>

</body>
</html>
